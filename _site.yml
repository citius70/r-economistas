name: "my-website"
output_dir: "docs"
exclude: ["intro_R.Rmd"]    # ← línea añadida
navbar:
  title: "R para economistas"
  left:
    - text: "Inicio"
      href: index.html
    - text: "1 Instalación"
      href: 1_instalacion.html
    - text: "2 Introducción a R"
      href: 2_ventanas.html
    - text: "3 Funciones y operadores básicos"
      href: 3_funciones_operadores.html
    - text: "4 Gestión de paquetes"
      href: 4_paquetes.html
    - text: "5 Vectores"
      href: 5_vectores.html

    - text: "Visualizaciones en R"
      href: graficos/graficos.html
output:
  html_document:
    highlight: textmate
    theme: cerulean
    toc: true
    toc_float: true
  pdf_document:
    toc: true            # Genera tabla de contenidos automática
    toc_depth: 2         # Profundidad de los títulos en la tabla (1-3)
    number_sections: true # Numeración automática de secciones (ej: 1.1, 1.2)
    fig_caption: true    # Muestra los pies de figura
    highlight: tango     # Estilo de resaltado de código (pygments, tango, zenburn, etc.)
    latex_engine: xelatex # Motor de renderizado (XeLaTeX es mejor para fuentes personalizadas)
    geometry: margin=1in # Márgenes del documento
